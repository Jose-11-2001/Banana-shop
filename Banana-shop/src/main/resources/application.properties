spring.application.name=Banana-shop

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/Banana-shopdb
spring.datasource.username=postgres
spring.datasource.password=2001
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2024!
jwt.expiration=86400000

# Email (disable for now)
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed.origins=http://localhost:3000
upload.path=./uploads

# PostgreSQL specific
spring.sql.init.platform=postgresql
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.syntaxHighlight.enabled=true
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true
springdoc.packages-to-scan=com.bananashop.controller
springdoc.paths-to-match=/api/**